services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shortener
      POSTGRES_PASSWORD: shortener_pass
      POSTGRES_DB: shortener_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shortener -d shortener_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Healthcheck doubles as the "tables are created" signal for the
    # workers below: api's lifespan handler runs create_all() before
    # uvicorn starts serving, so healthy == schema is ready.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    # Scale read-path capacity horizontally:
    #   docker compose up --scale api=4
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  analytics_worker:
    build: .
    command: ["python", "-m", "app.workers.analytics_worker"]
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      api:
        condition: service_healthy

  expiry_sweeper:
    build: .
    command: ["python", "-m", "app.workers.expiry_sweeper"]
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
